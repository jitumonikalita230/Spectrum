name: Handle Comments

on:
  repository_dispatch:
    types: [add-comment, delete-comment]

jobs:
  handle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Update comments
        run: |
          mkdir -p data
          [ -f data/comments.json ] || echo "[]" > data/comments.json

          node <<'EOF'
          const fs = require('fs');
          const path = 'data/comments.json';
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          const payload = ${{ toJson(github.event.client_payload) }};
          const type = '${{ github.event.action }}';

          if (type === 'add-comment') {
            data.push({ id: payload.id, name: payload.name, message: payload.message, date: new Date().toISOString() });
          } else if (type === 'delete-comment') {
            const idx = data.findIndex(c => c.id === payload.id);
            if (idx !== -1) data.splice(idx, 1);
          }

          fs.writeFileSync(path, JSON.stringify(data, null, 2));
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/comments.json
          git commit -m "Update comments [skip ci]" || echo "No changes"
          git push
